<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FLAIRLAB Content Pipeline V2</title>
  <style>
    body{font:16px system-ui;margin:0;background:#f4f5f7;color:#18202a}
    main{max-width:960px;margin:auto;padding:24px}
    section{background:white;border-radius:12px;padding:18px;margin:14px 0;box-shadow:0 2px 12px #0001}
    label{display:block;font-weight:650;margin-top:10px}
    input,textarea,select,button{box-sizing:border-box;width:100%;padding:10px;margin-top:5px}
    textarea{min-height:110px;font-family:ui-monospace,monospace}
    button{cursor:pointer;background:#111827;color:white;border:0;border-radius:8px}
    button.secondary{background:#4b5563}
    pre{white-space:pre-wrap;overflow-wrap:anywhere;background:#f8fafc;padding:12px}
    #errorModal{display:none;position:fixed;inset:0;background:#450a0acc;padding:10vh 20px;z-index:10}
    #errorCard{max-width:700px;margin:auto;background:#7f1d1d;color:white;padding:24px;border:2px solid #fecaca;border-radius:12px}
    #errorCard button{background:white;color:#7f1d1d}
  </style>
</head>
<body>
<main>
  <h1>FLAIRLAB V2</h1>
  <p>Strukturierte Session ohne CSV oder ZIP.</p>
  <section>
    <label>API key<input id="apiKey" type="password"></label>
    <label>User ID<input id="userId" value="flairlab-user"></label>
    <label>Post type<select id="postType"><option value="event">Event</option></select></label>
    <button onclick="createSession()">Session erstellen</button>
  </section>
  <section>
    <label>Manueller Text<textarea id="manualText"></textarea></label>
    <label>Bestätigte Fakten (JSON)<textarea id="facts">{}</textarea></label>
    <label>Audio<input id="audio" type="file" accept="audio/*" multiple></label>
    <label>Bilder (optional)<input id="images" type="file" accept="image/*" multiple></label>
    <button onclick="saveInputs()">Eingaben speichern</button>
    <button class="secondary" onclick="analyze()">Analysieren</button>
  </section>
  <section>
    <h2>Rückfragen</h2><pre id="questions">—</pre>
    <label>Antworten/Korrekturen (JSON)<textarea id="answers">{}</textarea></label>
    <button onclick="submitAnswers()">Antworten speichern</button>
  </section>
  <section>
    <h2>Generierung</h2>
    <p>Bei konfiguriertem V2-Sprachmodell können beide JSON-Felder leer bleiben.</p>
    <label>Shared fields (JSON)<textarea id="shared">{}</textarea></label>
    <label>ACF source fields (JSON)<textarea id="acf">{}</textarea></label>
    <button onclick="generate()">Entwurf generieren</button>
    <pre id="preview">—</pre>
    <button onclick="approve()">Freigeben</button>
    <label>Idempotency key<input id="idempotencyKey"></label>
    <button onclick="publish()">In WordPress schreiben</button>
  </section>
  <section><h2>Session</h2><pre id="session">Noch keine Session.</pre></section>
</main>
<div id="errorModal"><div id="errorCard"><h2>Kritischer Fehler</h2><pre id="errorText"></pre><button onclick="closeError()">Schließen</button></div></div>
<script>
let current=null;
const byId=id=>document.getElementById(id);
const headers=json=>({"X-API-Key":byId("apiKey").value,"X-User-ID":byId("userId").value,...(json?{"Content-Type":"application/json"}:{})});
function parse(id){try{return JSON.parse(byId(id).value||"{}")}catch(e){throw new Error(`${id}: ungültiges JSON`)}}
function showError(error){byId("errorText").textContent=error?.message||JSON.stringify(error,null,2);byId("errorModal").style.display="block"}
function closeError(){byId("errorModal").style.display="none"}
async function api(path,options={}){const response=await fetch(path,options);const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.message||data.detail||`HTTP ${response.status}`);return data}
function render(data){current=data.session||data;byId("session").textContent=JSON.stringify(current,null,2);byId("questions").textContent=(current.clarification_questions||[]).join("\n")||"—";byId("preview").textContent=JSON.stringify(current.wordpress_payload||{},null,2);if(!byId("idempotencyKey").value&&current.session_id)byId("idempotencyKey").value=`${current.session_id}-publish`}
async function createSession(){render(await api("/api/content-sessions",{method:"POST",headers:headers(true),body:JSON.stringify({user_id:byId("userId").value,post_type_key:byId("postType").value})}))}
async function saveInputs(){if(!current)throw new Error("Zuerst Session erstellen.");let data=await api(`/api/content-sessions/${current.session_id}/inputs`,{method:"POST",headers:headers(true),body:JSON.stringify({expected_version:current.version,manual_text:byId("manualText").value,confirmed_facts:parse("facts")})});render(data);for(const [kind,id] of [["audio","audio"],["image","images"]])for(const file of byId(id).files){const form=new FormData();form.append("expected_version",current.version);form.append("kind",kind);form.append("upload",file);data=await api(`/api/content-sessions/${current.session_id}/uploads`,{method:"POST",headers:headers(false),body:form});render(data)}}
async function analyze(){render(await api(`/api/content-sessions/${current.session_id}/analyze`,{method:"POST",headers:headers(true),body:JSON.stringify({expected_version:current.version})}))}
async function submitAnswers(){render(await api(`/api/content-sessions/${current.session_id}/answers`,{method:"POST",headers:headers(true),body:JSON.stringify({expected_version:current.version,corrections:parse("answers")})}))}
async function generate(){render(await api(`/api/content-sessions/${current.session_id}/generate`,{method:"POST",headers:headers(true),body:JSON.stringify({expected_version:current.version,shared_fields:parse("shared"),acf_source_fields:parse("acf"),selected_links:[]})}))}
async function approve(){render(await api(`/api/content-sessions/${current.session_id}/approve`,{method:"POST",headers:headers(true),body:JSON.stringify({expected_version:current.version,user_id:byId("userId").value})}))}
async function publish(){render(await api(`/api/content-sessions/${current.session_id}/publish`,{method:"POST",headers:headers(true),body:JSON.stringify({expected_version:current.version,idempotency_key:byId("idempotencyKey").value})}))}
window.addEventListener("unhandledrejection",event=>{event.preventDefault();showError(event.reason)});
window.addEventListener("error",event=>showError(event.error||event.message));
</script>
</body>
</html>
