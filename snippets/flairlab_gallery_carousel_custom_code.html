<style>
.flairlab-gallery-carousel {
  width: 100%;
  overflow: hidden;
  position: relative;
}

.flairlab-gallery-carousel .swiper-wrapper {
  align-items: stretch;
}

.flairlab-gallery-carousel .swiper-slide-inner {
  display: block;
  margin: 0;
}

.flairlab-gallery-carousel .swiper-slide-image {
  width: 100%;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  display: block;
}

.flairlab-gallery-carousel:not(.swiper-initialized) .swiper-wrapper {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 18px;
}

.flairlab-gallery-carousel:not(.swiper-initialized) .elementor-swiper-button,
.flairlab-gallery-carousel:not(.swiper-initialized) .swiper-pagination,
.flairlab-gallery-carousel:not(.swiper-initialized) .swiper-notification {
  display: none;
}
</style>

<script>
(function () {
  function getSwiperConstructor() {
    if (window.Swiper) {
      return window.Swiper;
    }

    if (
      window.elementorFrontend &&
      window.elementorFrontend.utils &&
      window.elementorFrontend.utils.swiper
    ) {
      return window.elementorFrontend.utils.swiper;
    }

    return null;
  }

  function createSwiper(el, options) {
    var SwiperConstructor = getSwiperConstructor();

    if (!SwiperConstructor) {
      return null;
    }

    var instance = new SwiperConstructor(el, options);

    if (instance && typeof instance.then === "function") {
      instance.then(function (resolvedInstance) {
        el.flairlabSwiper = resolvedInstance;
      });
    } else {
      el.flairlabSwiper = instance;
    }

    return instance;
  }

  function initFlairlabGalleryCarousels() {
    document
      .querySelectorAll("[data-flairlab-gallery-carousel]")
      .forEach(function (el) {
        if (el.flairlabSwiper || el.classList.contains("swiper-initialized")) {
          return;
        }

        createSwiper(el, {
          loop: true,
          speed: 500,
          autoplay: {
            delay: 5000,
            disableOnInteraction: false,
            pauseOnMouseEnter: true
          },
          spaceBetween: 18,
          slidesPerView: 1,
          pagination: {
            el: el.querySelector(".swiper-pagination"),
            clickable: true
          },
          navigation: {
            nextEl: el.querySelector(".elementor-swiper-button-next"),
            prevEl: el.querySelector(".elementor-swiper-button-prev")
          },
          breakpoints: {
            768: {
              slidesPerView: 1
            },
            1024: {
              slidesPerView: 1
            }
          }
        });
      });
  }

  function initWithRetries(attempt) {
    initFlairlabGalleryCarousels();

    if (!getSwiperConstructor() && attempt < 20) {
      window.setTimeout(function () {
        initWithRetries(attempt + 1);
      }, 250);
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", function () {
      initWithRetries(0);
    });
  } else {
    initWithRetries(0);
  }

  window.addEventListener("load", function () {
    initWithRetries(0);
  });

  if (window.jQuery) {
    window.jQuery(window).on("elementor/frontend/init", function () {
      initWithRetries(0);
    });
  }
})();
</script>
